<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mark ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow: hidden;
}

h1 {
  font-size: 28px;
  min-height: 60px;
  color: #333;
  transition: 0.3s;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

img {
  width: 200px;
  border-radius: 15px;
  margin-top: 20px;
  display: none;
}

/* ❤️爱心 */
.heart {
  position: fixed;
  color: #ff6b81;
  animation: float 4s linear;
}

@keyframes float {
  from {transform: translateY(0); opacity:1;}
  to {transform: translateY(-700px); opacity:0;}
}
</style>
</head>

<body onclick="next()">

<div>
  <h1 id="text">Tap anywhere 💌</h1>
  <button onclick="next()">Continue</button>
  <br>
  <img id="photo" src="mmexport1775756575498.jpg">

<!-- 🎵音乐（点击后自动播放） -->
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const messages = [
  "Today is a special day 🎂",
  "It's your birthday",
  "I was thinking what gift to give you...",
  "Nothing felt special enough",
  "So I made this just for you",
  "Maybe it's a bit silly",
  "But I really wanted to do it",
  "There is something I want to tell you...",
  "👉 I've liked you for a while ❤️"
];

let i = 0;
let typing = false;
let currentText = "";
let fullText = "";

function typeText(text) {
  let j = 0;
  typing = true;
  fullText = text;
  currentText = "";
  document.getElementById("text").innerText = "";

  function typingEffect() {
    if (j < text.length) {
      currentText += text[j];
      document.getElementById("text").innerText = currentText;
      j++;
      setTimeout(typingEffect, 40);
    } else {
      typing = false;
    }
  }

  typingEffect();
}

function next() {
  // 🎵播放音乐（只触发一次）
  document.getElementById("bgm").play().catch(()=>{});

  // 👉 打字中点击 = 直接显示完整
  if (typing) {
    document.getElementById("text").innerText = fullText;
    typing = false;
    return;
  }

  if (i < messages.length) {
    typeText(messages[i]);
    i++;
  }

  // 📸中途展示图片（第5句后）
  if (i === 5) {
    document.getElementById("photo").style.display = "block";
  }

  // 💥最终效果
  if (i === messages.length) {
    document.querySelector("button").style.display = "none";
    document.getElementById("text").style.fontSize = "34px";
    startHearts();
  }
}

// ❤️爱心生成
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }, 200);
}
</script>

</body>
</html>
